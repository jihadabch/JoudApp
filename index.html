<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOUD GROUP | مؤسسة جود</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/000000/shop.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JOUD GROUP">

    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/000000/shop.png">

    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .page { display: none; min-height: 100vh; padding-bottom: 100px; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header {
            background-color: #d5e8d4;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            padding: 50px 20px 70px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="installBanner" class="fixed bottom-24 left-4 right-4 bg-white p-5 rounded-[2.5rem] shadow-2xl z-[3000] border border-green-100 hidden">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-green-700 rounded-2xl flex items-center justify-center text-white text-xl font-black">J</div>
            <div class="flex-1">
                <h4 class="text-sm font-black text-gray-800">تطبيق مؤسسة جود</h4>
                <p class="text-[10px] text-gray-500 font-bold">تثبيت للوصول السريع والطلب السهل</p>
            </div>
            <button onclick="triggerInstall()" class="bg-green-700 text-white px-5 py-2.5 rounded-2xl text-xs font-black shadow-lg shadow-green-100">تثبيت</button>
        </div>
    </div>

    <header>
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-md">
            <img src="https://img.icons8.com/fluency/48/000000/shop.png" class="w-10 h-10">
        </div>
        <h1 class="text-3xl font-black text-green-900">JOUD GROUP</h1>
        <p class="text-[10px] font-black text-green-700 tracking-widest mt-1 uppercase italic">Abbousha Institution</p>
    </header>

    <main id="homePage" class="page active-page px-6 -mt-10">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-gray-50 text-center">
            <h2 class="text-xl font-black text-gray-800 mb-2">أهلاً بك يا جهاد</h2>
            <p class="text-gray-500 text-sm font-bold italic">الملف الآن جاهز بالكامل ليكون تطبيقاً (PWA) مع أيقونة تظهر على الشاشة الرئيسية.</p>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border text-center flex flex-col items-center">
                <span class="text-3xl mb-2">🥤</span>
                <p class="font-black text-xs">البلاستيك</p>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border text-center flex flex-col items-center">
                <span class="text-3xl mb-2">📄</span>
                <p class="font-black text-xs">الورق</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/95 backdrop-blur-md h-16 rounded-[2.2rem] shadow-2xl flex items-center justify-around z-[1000] border border-gray-100">
        <button class="flex flex-col items-center text-green-800">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] font-black">الرئيسية</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <span class="text-xl">📦</span>
            <span class="text-[9px] font-black italic">المنتجات</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <span class="text-xl">🛒</span>
            <span class="text-[9px] font-black italic">السلة</span>
        </button>
    </nav>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                document.getElementById('installBanner').classList.remove('hidden');
            }, 3000);
        });

        async function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('installBanner').classList.add('hidden');
            } else {
                alert("على آيفون: اضغط على زر 'مشاركة' ثم 'إضافة إلى الشاشة الرئيسية'");
            }
        }
    </script>
</body>
</html>
