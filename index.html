<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOUD GROUP | مؤسسة جود</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .page { display: none; min-height: 100vh; padding-bottom: 120px; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        header { background-color: #d5e8d4; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; padding: 40px 20px 60px; text-align: center; }

        .slider-container { width: 100%; height: 180px; overflow: hidden; border-radius: 25px; position: relative; background: #fff; border: 1px solid #e2e8f0; touch-action: pan-y; }
        .slider-wrapper { display: flex; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        .slide { min-width: 100%; width: 100%; height: 100%; object-fit: contain; background: #f8fafc; padding: 5px; }

        .box-3d-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .box-3d { min-width: 85px; height: 85px; background: white; border-radius: 20px; flex-shrink: 0; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .box-3d img { width: 75%; height: 75%; object-fit: contain; }

        .nav-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; color: #94a3b8; flex: 1; position: relative; }
        .nav-item.active { color: #166534; font-weight: 900; }
        #cartBadge { position: absolute; top: -5px; right: 15%; background: #ef4444; color: white; font-size: 10px; font-weight: 900; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; opacity: 0; transition: 0.3s; }

        .product-card { background: white; border-radius: 1.5rem; padding: 12px; border: 1px solid #f1f5f9; }
        #welcomeModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 5000; display: none; }
    </style>
</head>
<body>

    <div id="welcomeModal">
        <div class="bg-white w-[85%] p-6 rounded-[2.5rem] text-center shadow-2xl">
            <h2 class="text-2xl font-black text-green-800 mb-2">أهلاً بك في JOUD GROUP</h2>
            <p class="text-gray-600 text-sm mb-6 font-bold">تطبيقنا أسرع وأسهل للاستخدام</p>
            <button id="installBtn" class="w-full bg-green-700 text-white py-4 rounded-2xl font-black mb-3">تحميل التطبيق الآن</button>
            <button onclick="closeModal()" class="text-gray-400 text-xs underline">تصفح بدون تحميل</button>
        </div>
    </div>

    <header onclick="handleSecretTap()">
        <h1 class="text-3xl font-black text-green-900 italic">JOUD GROUP</h1>
        <p class="text-[10px] font-black text-green-700 uppercase italic">مؤسسة جود للتجارة</p>
    </header>

    <main id="homePage" class="page active-page px-4 -mt-10">
        <div class="bg-white p-1 rounded-[2.2rem] shadow-xl mb-6 border overflow-hidden">
            <div id="sliderCont" class="slider-container">
                <div id="mainSlider" class="slider-wrapper"></div>
            </div>
        </div>
        <div class="box-3d-container" id="boxes3D"></div>
        <div class="bg-white p-2 rounded-2xl shadow-md border my-6 flex items-center px-4">
            <input type="text" id="smartSearch" onkeyup="doSearch()" placeholder="🔍 ابحث عن صنف..." class="w-full p-2 outline-none text-sm font-bold bg-transparent text-right">
        </div>
        <div id="homeProductGrid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <main id="cartPage" class="page px-6 pt-10">
        <h2 class="text-2xl font-black mb-6 text-center text-green-900 italic">سلتك 🛒</h2>
        <div id="cartItemsList" class="space-y-4 mb-10 text-right"></div>
        <div id="cartTotal" class="bg-white p-6 rounded-[2.5rem] text-center font-black shadow-xl border-2 border-green-100 hidden">
            <p class="text-lg">المجموع: <span id="totalPrice" class="text-green-700">0</span>$</p>
            <button onclick="sendOrder()" class="w-full bg-green-700 text-white mt-4 py-4 rounded-2xl font-black">إرسال الطلب واتساب</button>
        </div>
    </main>

    <main id="catsPage" class="page px-6 pt-10">
        <div id="catsMenu">
            <h2 class="text-xl font-black mb-8 text-center text-green-900">الأقسام</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="filterByCat('بلاستيك')" class="bg-white p-6 rounded-[2rem] text-center shadow-sm border font-black">🥤 بلاستيك</div>
                <div onclick="filterByCat('ورق')" class="bg-white p-6 rounded-[2rem] text-center shadow-sm border font-black">📄 ورق</div>
                <div onclick="filterByCat('نايلون')" class="bg-white p-6 rounded-[2rem] text-center shadow-sm border font-black">🛍️ نايلون</div>
                <div onclick="filterByCat('أخرى')" class="bg-white p-6 rounded-[2rem] text-center shadow-sm border font-black">📦 أخرى</div>
            </div>
        </div>
        <div id="catItemsSection" class="hidden">
            <button onclick="showCatsMenu()" class="text-red-500 mb-4 font-bold">← رجوع</button>
            <div id="catProductGrid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <main id="contactPage" class="page px-6 pt-10">
        <h2 class="text-2xl font-black mb-8 text-center text-green-900 italic">تواصل معنا</h2>
        <div class="space-y-4">
            <a href="tel:+96176985172" class="flex justify-between bg-white p-5 rounded-2xl border font-black"><span>إتصال</span><span>📞</span></a>
            <a href="https://wa.me/96176985172" class="flex justify-between bg-white p-5 rounded-2xl border font-black text-green-600"><span>واتساب</span><span>💬</span></a>
            <a href="mailto:info@joudgroup.com" class="flex justify-between bg-white p-5 rounded-2xl border font-black text-blue-600"><span>إيميل</span><span>📧</span></a>
            <a href="https://maps.google.com" target="_blank" class="flex justify-between bg-white p-5 rounded-2xl border font-black text-red-600"><span>موقعنا</span><span>📍</span></a>
        </div>
    </main>

    <main id="adminPage" class="page px-6 pt-10 bg-white">
        <h2 class="text-xl font-black text-red-600 mb-6 text-center">الإدارة ⚙️</h2>
        <div class="space-y-4 pb-24 text-right">
            <div class="bg-gray-50 p-4 rounded-2xl border">
                <input id="pName" placeholder="اسم الصنف" class="w-full p-3 mb-2 border rounded-xl">
                <input id="pPrice" placeholder="السعر" class="w-full p-3 mb-2 border rounded-xl">
                <input id="pImg" placeholder="رابط الصورة" class="w-full p-3 mb-2 border rounded-xl">
                <select id="pCat" class="w-full p-3 mb-4 border rounded-xl">
                    <option value="بلاستيك">بلاستيك</option><option value="ورق">ورق</option><option value="نايلون">نايلون</option><option value="أخرى">أخرى</option>
                </select>
                <button onclick="saveProduct()" class="w-full bg-black text-white py-4 rounded-xl font-black">نشر</button>
            </div>
            <div id="adminProductList" class="space-y-2"></div>
            <button onclick="swPage('home')" class="w-full text-gray-400 font-bold py-4">خروج</button>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white/95 h-16 rounded-[2.2rem] shadow-2xl flex items-center justify-around z-[1000] border">
        <div onclick="swPage('home', this)" class="nav-item active"><span>🏠</span><span class="text-[9px] font-bold">الرئيسية</span></div>
        <div onclick="swPage('cats', this)" class="nav-item"><span>📂</span><span class="text-[9px] font-bold">الأقسام</span></div>
        <div onclick="swPage('cart', this)" class="nav-item"><div id="cartBadge">0</div><span>🛒</span><span class="text-[9px] font-bold">السلة</span></div>
        <div onclick="swPage('contact', this)" class="nav-item"><span>📞</span><span class="text-[9px] font-bold">تواصل</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-WfO-E0Z6_z-pYm8V6S-Hq7K-L0P1M",
            authDomain: "jihadapp-a839e.firebaseapp.com",
            databaseURL: "https://jihadapp-a839e-default-rtdb.firebaseio.com",
            projectId: "jihadapp-a839e",
            storageBucket: "jihadapp-a839e.appspot.com",
            messagingSenderId: "811463495565",
            appId: "1:811463495565:web:70fb8c8f722d777586b7c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allProds = [], cart = [], curS = 0, deferredPrompt;

        // --- نظام الـ Install الذكي ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!sessionStorage.getItem('modalShown')) {
                document.getElementById('welcomeModal').style.display = 'flex';
                sessionStorage.setItem('modalShown', 'true');
            }
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
            closeModal();
        });

        window.closeModal = () => document.getElementById('welcomeModal').style.display = 'none';

        // --- السلة المطورة (زيادة ونقصان) ---
        window.addToCart = function(n, p) {
            let item = cart.find(x => x.name === n);
            if(item) item.qty++; else cart.push({name:n, price:p, qty:1});
            updateBadge();
        };

        window.changeQty = function(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateBadge();
            window.renderCart();
        };

        function updateBadge() {
            const b = document.getElementById('cartBadge');
            b.innerText = cart.reduce((a, b) => a + b.qty, 0);
            b.style.opacity = cart.length > 0 ? "1" : "0";
        }

        window.renderCart = function() {
            const list = document.getElementById('cartItemsList');
            if(cart.length === 0) { 
                list.innerHTML = '<p class="text-center py-10">السلة فارغة</p>';
                document.getElementById('cartTotal').classList.add('hidden');
                return; 
            }
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += (item.price * item.qty);
                return `
                <div class="bg-white p-4 rounded-xl flex justify-between border items-center shadow-sm">
                    <div>
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-green-700 text-xs">${item.price}$</p>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 px-3 py-1 rounded-full border">
                        <button onclick="changeQty(${idx}, 1)" class="text-green-600 font-black text-lg">+</button>
                        <span class="font-bold text-sm">${item.qty}</span>
                        <button onclick="changeQty(${idx}, -1)" class="text-red-500 font-black text-lg">-</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = total.toFixed(2);
            document.getElementById('cartTotal').classList.remove('hidden');
        };

        // --- السلايدر والبيانات (ثبات كامل) ---
        function initApp() {
            onValue(ref(db, 'settings/layout'), (s) => {
                const d = s.val();
                if(d && d.slides) document.getElementById('mainSlider').innerHTML = d.slides.map(u => `<img src="${u}" class="slide">`).join('');
                if(d && d.boxes) document.getElementById('boxes3D').innerHTML = d.boxes.map(u => `<div class="box-3d"><img src="${u}"></div>`).join('');
            });
            onValue(ref(db, 'products'), (s) => {
                const d = s.val();
                allProds = d ? Object.keys(d).map(k => ({id:k, ...d[k]})) : [];
                window.renderProducts(allProds);
                window.renderAdminList();
            });
            setInterval(() => moveSlide(1), 5000);
        }

        function moveSlide(dir) {
            const w = document.getElementById('mainSlider');
            const s = w.querySelectorAll('.slide');
            if (s.length <= 1) return;
            curS = (curS + dir + s.length) % s.length;
            w.style.transform = `translateX(${curS * 100}%)`;
        }

        window.renderProducts = (data) => {
            document.getElementById('homeProductGrid').innerHTML = data.slice().reverse().map(p => `
                <div class="product-card flex flex-col items-center shadow-sm">
                    <img src="${p.img}" class="h-24 w-full object-contain mb-2">
                    <h3 class="font-black text-[10px] text-center h-8 overflow-hidden">${p.name}</h3>
                    <div class="flex justify-between items-center w-full mt-2">
                        <span class="text-green-700 font-black text-xs">${p.price}$</span>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="bg-green-800 text-white px-3 py-1 rounded-lg text-[9px]">أضف</button>
                    </div>
                </div>`).join('');
        };

        // --- باقي الوظائف (إدارة، تواصل، بحث) ---
        window.saveProduct = () => {
            const n=document.getElementById('pName').value, p=document.getElementById('pPrice').value, i=document.getElementById('pImg').value, c=document.getElementById('pCat').value;
            if(!n || !p) return alert("أكمل البيانات");
            push(ref(db,'products'), {name:n, price:parseFloat(p), img:i||"https://via.placeholder.com/150", category:c, time:Date.now()})
            .then(()=>{alert("تم النشر ✅"); window.swPage('home');});
        };
        window.deleteProduct = (id) => { if(confirm("حذف؟")) remove(ref(db,'products/'+id)); };
        window.renderAdminList = () => {
            document.getElementById('adminProductList').innerHTML = allProds.map(p => `
            <div class="flex justify-between bg-white p-2 rounded-lg border text-[10px] font-bold">
                <span>${p.name}</span><button onclick="deleteProduct('${p.id}')" class="text-red-500">حذف</button>
            </div>`).join('');
        };
        window.swPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id+'Page').classList.add('active-page');
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            if(id === 'cart') window.renderCart();
        };
        window.doSearch = () => {
            const q = document.getElementById('smartSearch').value.toLowerCase();
            window.renderProducts(allProds.filter(p => p.name.toLowerCase().includes(q)));
        };
        window.filterByCat = (cat) => {
            const f = allProds.filter(p => p.category === cat);
            document.getElementById('catProductGrid').innerHTML = f.map(p => `<div class="product-card flex flex-col items-center"><img src="${p.img}" class="h-20 object-contain"><p class="text-[10px] font-bold mt-2">${p.name}</p><button onclick="addToCart('${p.name}', ${p.price})" class="bg-green-800 text-white w-full py-1 rounded-lg text-[9px] mt-2">أضف</button></div>`).join('');
            document.getElementById('catsMenu').classList.add('hidden');
            document.getElementById('catItemsSection').classList.remove('hidden');
        };
        window.showCatsMenu = () => { document.getElementById('catsMenu').classList.remove('hidden'); document.getElementById('catItemsSection').classList.add('hidden'); };
        window.sendOrder = () => {
            let m = "طلب من مؤسسة جود:\n";
            cart.forEach(i => m += `• ${i.name} (${i.qty}) = ${i.price * i.qty}$\n`);
            m += `\nالمجموع: ${document.getElementById('totalPrice').innerText}$`;
            window.open(`https://wa.me/96176985172?text=${encodeURIComponent(m)}`);
        };
        window.handleSecretTap = () => {
            window.taps = (window.taps || 0) + 1;
            if(window.taps === 6) { const p = prompt("الرمز:"); if(p === "joud2026") window.swPage('admin'); window.taps = 0; }
            setTimeout(() => window.taps = 0, 2000);
        };
        window.onload = initApp;
    </script>
</body>
</html>
